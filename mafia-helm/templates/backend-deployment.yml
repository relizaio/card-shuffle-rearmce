apiVersion: apps/v1
kind: Deployment
metadata:
  name: mafia-backend
  namespace: {{ .Release.Namespace }}
  labels:
    name: mafia-backend
    app: mafia
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: mafia
  template:
    metadata:
      labels:
        name: mafia-backend
        app: mafia
    spec:
      containers:
      - name: mafia-backend-container
        image: {{ .Values.backend.image }}
        env:
        - name: REDIS_HOST
          value: redis-service
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
      imagePullSecrets: 
      - name : regcred-mafia
